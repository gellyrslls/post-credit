# .github/workflows/deploy.yml
# Builds the Astro site and deploys the static output to GitHub Pages
# on every push to the main branch.
#
# Setup required in your GitHub repo:
#   Settings → Pages → Source → "GitHub Actions"
#   (Not "Deploy from a branch" — choose the Actions option)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Required permissions for the GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build site
        run: npm run build
        # astro.config.ts sets site + base, so all paths are /post-credit/* automatically

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro outputs to ./dist by default
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
